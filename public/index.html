<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Token Pump Radar</title>
  <meta name="description" content="Lightweight crypto analytics ranked by Final Pump Score (FPS)." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%93%A1%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">Token Pump Radar</span>
      <span class="brand-sub">FPS-based ranking</span>
    </div>
    <div class="meta">
      <span id="meta-status" class="chip chip-idle">idle</span>
      <span id="meta-count" class="muted">0 tokens</span>
      <span id="meta-updated" class="muted">never</span>
    </div>
  </header>

  <section class="controls">
    <input id="search" type="search" placeholder="Search token / symbol / chain" autocomplete="off" spellcheck="false" />
    <div class="filters" role="tablist" aria-label="filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="trending">Trending (FPS ≥ 60)</button>
      <button class="filter" data-filter="new">New (&lt; 24h)</button>
      <button class="filter" data-filter="highscore">High Score (FPS ≥ 80)</button>
    </div>
  </section>

  <main>
    <table id="tokens" class="tokens">
      <thead>
        <tr>
          <th class="col-rank">#</th>
          <th class="col-token">Token</th>
          <th class="col-num">Price</th>
          <th class="col-num">Vol 1h</th>
          <th class="col-num">Vol 24h</th>
          <th class="col-num">Liquidity</th>
          <th class="col-num">MC/FDV</th>
          <th class="col-num">%1h</th>
          <th class="col-num col-fps" data-sort="fps">FPS ▼</th>
        </tr>
      </thead>
      <tbody id="tokens-body">
        <tr class="placeholder"><td colspan="9">Loading…</td></tr>
      </tbody>
    </table>
  </main>

  <footer class="footnote">
    <span>FPS = 25·VAI + 20·PMI + 20·BPR + 15·LSS + 10·SMS + 10·AS</span>
    <span class="legend">
      <span class="tag tag-gem">80+ Gem</span>
      <span class="tag tag-watch">60+ Watch</span>
      <span class="tag tag-side">40+ Side</span>
      <span class="tag tag-no">&lt;40 Skip</span>
    </span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
